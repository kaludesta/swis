<!DOCTYPE html>
<html>
<head>
  <title>Clear Extension Storage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
    }
    button {
      background: #dc2626;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin: 10px 0;
    }
    button:hover {
      background: #b91c1c;
    }
    .success {
      background: #10b981;
      color: white;
      padding: 12px;
      border-radius: 6px;
      margin: 10px 0;
      display: none;
    }
    .info {
      background: #f3f4f6;
      padding: 12px;
      border-radius: 6px;
      margin: 10px 0;
      border-left: 4px solid #3b82f6;
    }
  </style>
</head>
<body>
  <h1>Clear Extension Storage</h1>
  
  <div class="info">
    <strong>⚠️ Warning:</strong> This will clear all locally stored tracking data in the extension. 
    Use this after resetting the database to ensure clean tracking.
  </div>
  
  <button onclick="clearStorage()">Clear All Tracking Data</button>
  
  <div id="success" class="success">
    ✅ Storage cleared successfully! You can close this page.
  </div>
  
  <script>
    function clearStorage() {
      chrome.storage.local.clear(() => {
        document.getElementById('success').style.display = 'block';
        console.log('✅ Extension storage cleared');
      });
    }
  </script>
</body>
</html>
