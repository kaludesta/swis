<!DOCTYPE html>
<html>
<head>
  <title>Generate Extension Icons</title>
</head>
<body>
  <h2>Extension Icons Generator</h2>
  <p>Right-click each canvas and "Save image as..." with the corresponding filename:</p>
  
  <div>
    <p>icon16.png (16x16)</p>
    <canvas id="icon16" width="16" height="16"></canvas>
  </div>
  
  <div>
    <p>icon48.png (48x48)</p>
    <canvas id="icon48" width="48" height="48"></canvas>
  </div>
  
  <div>
    <p>icon128.png (128x128)</p>
    <canvas id="icon128" width="128" height="128"></canvas>
  </div>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#4F46E5';
      ctx.fillRect(0, 0, size, size);
      
      // Clock icon
      ctx.strokeStyle = '#FFFFFF';
      ctx.fillStyle = '#FFFFFF';
      ctx.lineWidth = size / 16;
      
      const centerX = size / 2;
      const centerY = size / 2;
      const radius = size / 3;
      
      // Circle
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
      ctx.stroke();
      
      // Clock hands
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX, centerY - radius * 0.6);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(centerX + radius * 0.5, centerY);
      ctx.stroke();
    }
    
    drawIcon('icon16', 16);
    drawIcon('icon48', 48);
    drawIcon('icon128', 128);
  </script>
</body>
</html>
